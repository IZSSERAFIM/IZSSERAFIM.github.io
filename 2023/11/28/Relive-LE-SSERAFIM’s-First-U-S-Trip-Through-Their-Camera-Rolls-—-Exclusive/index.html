es and Y2K cameras galore, the quintet made the most of their first time in the U.S. — and they took Teen Vogue along for the ride. Below, find a visual diary from LE SSERAFIM's first group trip to the U.S., straight from Kim Chaewon, Sakura, Huh Yunjin, Kazuha, and Hong Eunchae's camera rolls.\n\nAll pictures are courtesy of SOURCE MUSIC, exclusively for Teen Vogue. Digital composites by Sara Delgado.","isBasedOn":"https://www.teenvogue.com/story/le-sserafim-visual-diary-first-us-trip-exclusive","articleSection":"style","author":[{"@type":"Person","name":"Sara Delgado","sameAs":"https://www.teenvogue.com/contributor/sara-delgado"}],"dateModified":"2023-11-27T18:00:00.000-05:00","datePublished":"2023-11-27T18:00:00.000-05:00","headline":"Relive LE SSERAFIM’s First U.S. Trip Through Their Camera Rolls — Exclusive","image":["https://assets.teenvogue.com/photos/65650c3ee53979bbe2828205/16:9/w_3408,h_1917,c_limit/Relive%20LE%20SSERAFIM%E2%80%99s%20First%20U.S.%20Trip%20Through%20Their%20Camera%20Rolls%20%E2%80%94%20Exclusive.jpg","https://assets.teenvogue.com/photos/65650c3ee53979bbe2828205/4:3/w_2556,h_1917,c_limit/Relive%20LE%20SSERAFIM%E2%80%99s%20First%20U.S.%20Trip%20Through%20Their%20Camera%20Rolls%20%E2%80%94%20Exclusive.jpg","https://assets.teenvogue.com/photos/65650c3ee53979bbe2828205/1:1/w_1917,h_1917,c_limit/Relive%20LE%20SSERAFIM%E2%80%99s%20First%20U.S.%20Trip%20Through%20Their%20Camera%20Rolls%20%E2%80%94%20Exclusive.jpg"],"keywords":["celebrity style","style","le sserafim","textbelowcentergridwidth","web"],"thumbnailUrl":"https://assets.teenvogue.com/photos/65650c3ee53979bbe2828205/2:3/w_1278,h_1917,c_limit/Relive%20LE%20SSERAFIM%E2%80%99s%20First%20U.S.%20Trip%20Through%20Their%20Camera%20Rolls%20%E2%80%94%20Exclusive.jpg","url":"https://www.teenvogue.com/story/le-sserafim-visual-diary-first-us-trip-exclusive","isPartOf":{"@type":"CreativeWork","name":"Teen Vogue"},"isAccessibleForFree":true,"alternativeHeadline":"The members of LE SSERAFIM set foot in t <script>
  Fluid.utils.createScript('https://lib.baomitu.com/tocbot/4.20.1/tocbot.min.js', function() {
    var toc = jQuery('#toc');
    if (toc.length === 0 || !window.tocbot) { return; }
    var boardCtn = jQuery('#board-ctn');
    var boardTop = boardCtn.offset().top;

    window.tocbot.init(Object.assign({
      tocSelector     : '#toc-body',
      contentSelector : '.markdown-body',
      linkClass       : 'tocbot-link',
      activeLinkClass : 'tocbot-active-link',
      listClass       : 'tocbot-list',
      isCollapsedClass: 'tocbot-is-collapsed',
      collapsibleClass: 'tocbot-is-collapsible',
      scrollSmooth    : true,
      includeTitleTags: true,
      headingsOffset  : -boardTop,
    }, CONFIG.toc));
    if (toc.find('.toc-list-item').length > 0) {
      toc.css('visibility', 'visible');
    }

    Fluid.events.registerRefreshCallback(function() {
      if ('tocbot' in window) {
        tocbot.refresh();
        var toc = jQuery('#toc');
        if (toc.length === 0 || !tocbot) {
          return;
        }
        if (toc.find('.toc-list-item').length > 0) {
          toc.css('visibility', 'visible');
        }
      }
    });
  });
</script>

<script>
  Fluid.utils.createScript('https://lib.baomitu.com/anchor-js/4.3.1/anchor.min.js', function() {
    window.anchors.options = {
      placement: CONFIG.anchorjs.placement,
      visible  : CONFIG.anchorjs.visible
    };
    if (CONFIG.anchorjs.icon) {
      window.anchors.options.icon = CONFIG.anchorjs.icon;
    }
    var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
    var res = [];
    for (var item of el) {
      res.push('.markdown-body > ' + item.trim());
    }
    if (CONFIG.anchorjs.placement === 'left') {
      window.anchors.options.class = 'anchorjs-link-left';
    }
    window.anchors.add(res.join(', '));

    Fluid.events.registerRefreshCallback(function() {
      if ('anchors' in window) {
        anchors.removeAll();
        var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
        var res = [];
        for (var item of el) {
          res.push('.markdown-body > ' + item.trim());
        }
        if (CONFIG.anchorjs.placement === 'left') {
          anchors.options.class = 'anchorjs-link-left';
        }
        anchors.add(res.join(', '));
      }
    });
  });
</script>
